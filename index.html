<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mio Ricettario Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #c92a2a; --bg: #f5f5f7; --card: #ffffff;
            --pane: #1e3a8a; --dolci: #7e22ce; --basi: #eab308;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: calc(40px + env(safe-area-inset-top)) 20px 100px; color: #1d1d1f; }
        h1 { font-size: 34px; font-weight: 800; margin-bottom: 25px; text-align: center; }

        /* Griglia Cartelle Home */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .folder { background: var(--card); padding: 25px 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.1s; }
        .folder:active { transform: scale(0.95); }
        .folder i { font-size: 40px; display: block; margin-bottom: 10px; }
        .folder span { font-weight: 700; font-size: 18px; text-transform: capitalize; }

        /* Lista Ricette */
        .recipe-item { text-align: left; margin-bottom: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }

        /* Dettaglio Ricetta */
        .recipe-detail { background: white; padding: 20px; border-radius: 25px; min-height: 80vh; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .recipe-img { width: 100%; border-radius: 15px; margin-bottom: 20px; object-fit: cover; max-height: 350px; display: block; }
        .title-detail { font-size: 30px; font-weight: 800; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .section-h { font-size: 18px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-top: 30px; margin-bottom: 10px; letter-spacing: 1px; }
        .line { font-size: 20px; line-height: 1.6; padding: 8px 0; border-bottom: 1px solid #f2f2f7; color: #3a3a3c; }

        /* Bottoni e Interfaccia */
        .back-btn { background: #e5e5ea; padding: 12px 20px; border-radius: 12px; display: inline-block; margin-bottom: 15px; font-weight: 600; cursor: pointer; }
        .fab { position: fixed; bottom: 30px; right: 20px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 35px; border: none; font-size: 35px; font-weight: bold; box-shadow: 0 8px 20px rgba(201, 42, 42, 0.3); z-index: 99; }
        .hidden { display: none ! impossbile; }
        
        /* Modale Inserimento */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; padding:40px 20px; z-index:1000; overflow-y:auto; }
        .modal-h { font-size: 24px; font-weight: 800; margin-bottom: 20px; }
        input, textarea { width:100%; padding: 16px; margin-bottom: 15px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 17px; background: #f2f2f7; color: #000; }
        .img-preview { width: 100%; height: 180px; background: #f2f2f7; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #d1d1d6; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="home">
        <h1>Le Mie Ricette</h1>
        <div class="grid" id="folder-grid"></div>
    </div>

    <div id="list" class="hidden" style="display:none;">
        <div class="back-btn" onclick="showHome()">← Cartelle</div>
        <h2 id="cat-title" style="font-size: 28px; margin-bottom: 20px;"></h2>
        <div id="recipe-items"></div>
    </div>

    <div id="detail" class="hidden" style="display:none;">
        <div class="back-btn" id="btn-back-list">← Lista</div>
        <div class="recipe-detail">
            <img id="det-img" class="recipe-img" style="display:none;">
            <div id="det-title" class="title-detail"></div>
            <div class="section-h">Ingredienti</div>
            <div id="det-ing"></div>
            <div class="section-h">Procedimento</div>
            <div id="det-step"></div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-h">Nuova Ricetta</div>
        <div class="img-preview" id="preview-box">Nessuna foto</div>
        <input type="file" id="in-file" accept="image/*" capture="environment" style="display:none" onchange="previewImg(this)">
        <button onclick="document.getElementById('in-file').click()" style="width:100%; padding:15px; background:#007aff; color:white; border:none; border-radius:12px; margin-bottom:20px; font-weight:700;">📸 SCATTA O SCEGLI FOTO</button>
        
        <input type="text" id="in-title" placeholder="Nome della ricetta (es. Pane Comune)">
        <input type="text" id="in-cat" placeholder="Categoria (es. Pane, Basi, Dolci)">
        <textarea id="in-ing" rows="5" placeholder="Ingredienti (uno per riga)"></textarea>
        <textarea id="in-step" rows="5" placeholder="Procedimento (uno per riga)"></textarea>
        
        <button onclick="save()" style="width:100%; background:var(--primary); color:white; padding:20px; border-radius:15px; border:none; font-weight:800; font-size:20px;">SALVA RICETTA</button>
        <button onclick="closeM()" style="width:100%; background:none; border:none; margin-top:15px; color:#8e8e93; font-weight:600;">Annulla</button>
    </div>

    <button class="fab" onclick="openM()">+</button>

    <script>
        let recipes = JSON.parse(localStorage.getItem('pro_recipes_v3')) || [];
        const icons = { "Pane": "🍞", "Dolci": "🍰", "Basi": "🥣", "Pasticceria": "🥐", "Lievitati": "🍕" };
        let currentImgData = "";
        let pressTimer;

        // Gestione Anteprima Foto
        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImgData = e.target.result;
                    document.getElementById('preview-box').innerHTML = `<img src="${currentImgData}">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Mostra Home (Cartelle)
        function showHome() {
            document.getElementById('home').style.display = 'block';
            document.getElementById('list').style.display = 'none';
            document.getElementById('detail').style.display = 'none';
            const cats = [...new Set(recipes.map(r => r.cat))];
            const grid = document.getElementById('folder-grid');
            grid.innerHTML = cats.length ? cats.map(c => `
                <div class="folder" onclick="showCat('${c}')">
                    <i>${icons[c] || "📂"}</i>
                    <span>${c}</span>
                </div>
            `).join('') : "<p style='grid-column:1/3;text-align:center;color:grey;padding-top:20px;'>Nessuna ricetta salvata.<br>Tocca + per iniziare.</p>";
        }

        // Mostra Lista Ricette
        function showCat(c) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('list').style.display = 'block';
            document.getElementById('cat-title').innerText = c;
            const filtered = recipes.filter(r => r.cat === c);
            document.getElementById('recipe-items').innerHTML = filtered.map(r => `
                <div class="folder recipe-item" 
                     onclick="showDet(${r.id})" 
                     oncontextmenu="handleDel(event, ${r.id})"
                     ontouchstart="handleTouchStart(event, ${r.id})"
                     ontouchend="handleTouchEnd()">
                    <span>${r.title}</span>
                    <span style="color:#c7c7cc">→</span>
                </div>
            `).join('');
        }

        // Mostra Dettaglio
        function showDet(id) {
            const r = recipes.find(x => x.id === id);
            document.getElementById('list').style.display = 'none';
            document.getElementById('detail').style.display = 'block';
            
            const imgTag = document.getElementById('det-img');
            if(r.img) { imgTag.src = r.img; imgTag.style.display = 'block'; } 
            else { imgTag.style.display = 'none'; }
            
            document.getElementById('det-title').innerText = r.title;
            document.getElementById('det-ing').innerHTML = r.ing.split('\n').filter(l => l.trim()).map(l => `<div class="line">• ${l}</div>`).join('');
            document.getElementById('det-step').innerHTML = r.step.split('\n').filter(l => l.trim()).map(l => `<div class="line">• ${l}</div>`).join('');
            document.getElementById('btn-back-list').onclick = () => showCat(r.cat);
        }

        // Gestione Eliminazione (Tocco lungo / Tasto destro)
        function handleDel(e, id) { e.preventDefault(); confirmDel(id); }
        function handleTouchStart(e, id) { pressTimer = setTimeout(() => confirmDel(id), 800); }
        function handleTouchEnd() { clearTimeout(pressTimer); }
        function confirmDel(id) { 
            const r = recipes.find(x => x.id === id);
            if(confirm("Vuoi eliminare definitivamente '" + r.title + "'?")) { 
                recipes = recipes.filter(x => x.id !== id); 
                localStorage.setItem('pro_recipes_v3', JSON.stringify(recipes)); 
                showHome(); 
            } 
        }

        // Apertura e Chiusura (con Reset dei campi)
        function openM() { document.getElementById('modal').style.display='block'; }
        
        function closeM() { 
            document.getElementById('modal').style.display='none'; 
            // RESET TOTALE DEI CAMPI
            document.getElementById('in-title').value = "";
            document.getElementById('in-cat').value = "";
            document.getElementById('in-ing').value = "";
            document.getElementById('in-step').value = "";
            document.getElementById('in-file').value = "";
            document.getElementById('preview-box').innerHTML = "Nessuna foto";
            currentImgData = ""; 
        }

        // Salvataggio
        function save() {
            const t = document.getElementById('in-title').value.trim();
            const c = document.getElementById('in-cat').value.trim() || "Varie";
            const i = document.getElementById('in-ing').value;
            const s = document.getElementById('in-step').value;
            
            if(!t) return alert("Inserisci il nome della ricetta!");
            
            recipes.push({ id: Date.now(), title: t, cat: c, ing: i, step: s, img: currentImgData });
            localStorage.setItem('pro_recipes_v3', JSON.stringify(recipes));
            
            closeM(); 
            showHome();
        }

        // Avvio
        showHome();
    </script>
</body>
</html>
