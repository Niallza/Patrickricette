<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ricettario Smart Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --primary: #c92a2a; --bg: #f5f5f7; --card: #ffffff; --accent: #007aff; --danger: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: calc(40px + env(safe-area-inset-top)) 20px 100px; color: #1d1d1f; }
        .header-box { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 800; margin: 0 0 15px 0; }
        #search-bar { width: 100%; padding: 14px 15px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; margin-bottom: 20px; background: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .folder { background: var(--card); padding: 25px 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .folder i { font-size: 35px; display: block; margin-bottom: 8px; }
        .recipe-item { text-align: left; margin-bottom: 10px; padding: 18px; display: flex; justify-content: space-between; align-items: center; background: white; border-radius: 15px; border-left: 5px solid var(--primary); }
        .recipe-detail { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 60vh; }
        .title-detail { font-size: 28px; font-weight: 800; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; color: #000; }
        .section-h { font-size: 14px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-top: 25px; }
        .line { font-size: 19px; line-height: 1.6; padding: 10px 0; border-bottom: 1px solid #f2f2f7; white-space: pre-wrap; color: #3a3a3c; }
        .back-btn { background: #e5e5ea; padding: 12px 20px; border-radius: 12px; display: inline-block; margin-bottom: 15px; font-weight: 600; cursor: pointer; }
        .action-bar { display: flex; gap: 10px; margin-bottom: 15px; justify-content: flex-end; }
        .edit-btn { background: var(--accent); color: white; padding: 10px 15px; border-radius: 10px; border:none; font-weight:700; }
        .del-btn { background: var(--danger); color: white; padding: 10px 15px; border-radius: 10px; border:none; font-weight:700; }
        .fab { position: fixed; bottom: 30px; right: 20px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 35px; border: none; font-size: 35px; box-shadow: 0 8px 20px rgba(201, 42, 42, 0.3); z-index: 99; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; padding:40px 20px; z-index:1000; overflow-y:auto; }
        #ocr-status { display:none; background:#f0f0ff; color:#5856d6; padding:10px; border-radius:10px; text-align:center; font-weight:700; margin-bottom:10px; }
        input, textarea { width:100%; padding: 15px; margin-bottom: 15px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 16px; background: #f2f2f7; font-family: inherit; }
        .btn-ai { background: #5856d6; color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 700; width: 100%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-save { width:100%; background:var(--primary); color:white; padding:20px; border-radius:15px; border:none; font-weight:800; font-size:18px; }
        .hidden { display: none !important; }
        .loading-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; align-items:center; justify-content:center; z-index:2000; font-weight:800; }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">Sincronizzazione Team...</div>

    <div id="home">
        <div class="header-box">
            <h1>Ricettario Team</h1>
            <button onclick="exportCSV()" style="background:#34c759; color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:600; font-size:13px;">📥 Backup Excel</button>
        </div>
        <input type="text" id="search-bar" placeholder="🔍 Cerca ricetta..." oninput="searchRecipes()">
        <div id="search-results" class="hidden"></div>
        <div class="grid" id="folder-grid"></div>
    </div>

    <div id="list" class="hidden">
        <div class="back-btn" onclick="showHome()">← Home</div>
        <h2 id="cat-title" style="margin-bottom:20px;"></h2>
        <div id="recipe-items"></div>
    </div>

    <div id="detail" class="hidden">
        <div class="back-btn" id="btn-back-to-list">← Indietro</div>
        <div class="action-bar">
            <button class="edit-btn" id="edit-trigger">✎ MODIFICA</button>
            <button class="del-btn" id="del-trigger">🗑️ ELIMINA</button>
        </div>
        <div class="recipe-detail">
            <div id="det-title" class="title-detail"></div>
            <div class="section-h">Ingredienti</div>
            <div id="det-ing" class="line"></div>
            <div class="section-h">Procedimento</div>
            <div id="det-step" class="line"></div>
        </div>
    </div>

    <div id="modal">
        <h2 id="modal-title">Nuova Ricetta</h2>
        <div id="ocr-status">✨ L'IA sta leggendo... attendi...</div>
        <div id="ocr-area">
            <button class="btn-ai" onclick="document.getElementById('ai-input').click()">📸 LEGGI FOTO (AI)</button>
            <input type="file" id="ai-input" accept="image/*" style="display:none" onchange="runOCR(this)">
        </div>
        <input type="text" id="in-title" placeholder="Nome della Ricetta">
        <input type="text" id="in-cat" placeholder="Categoria (Pane, Dolci...)">
        <textarea id="in-ing" rows="6" placeholder="Ingredienti..."></textarea>
        <textarea id="in-step" rows="8" placeholder="Procedimento..."></textarea>
        <input type="hidden" id="edit-id">
        <button class="btn-save" id="btn-save-cloud" onclick="save()">SALVA NEL CLOUD</button>
        <button onclick="closeM()" style="width:100%; background:none; border:none; margin-top:15px; color:#8e8e93; font-weight:600;">Annulla</button>
    </div>

    <button class="fab" onclick="openM()">+</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhp8YLfgCnD2PZ3AZ6oB2xb5dXJ19c-Fc",
            authDomain: "ricettario-laboratorio-92621.firebaseapp.com",
            databaseURL: "https://ricettario-laboratorio-92621-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ricettario-laboratorio-92621",
            storageBucket: "ricettario-laboratorio-92621.firebasestorage.app",
            messagingSenderId: "393684653408",
            appId: "1:393684653408:web:4376ed5d6c76d0adcc3a05"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let recipes = [];
        const icons = { "Pane": "🍞", "Dolci": "🍰", "Basi": "🥣", "Lievitati": "🍕" };

        db.ref('ricette').on('value', (snapshot) => {
            const data = snapshot.val();
            recipes = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            document.getElementById('loader').style.display = 'none';
            // Se siamo in una categoria, aggiorna la lista senza chiuderla
            if(!document.getElementById('list').classList.contains('hidden')) {
                showCat(document.getElementById('cat-title').innerText);
            } else if(document.getElementById('home').classList.contains('hidden') === false) {
                showHome();
            }
        });

        function showHome() {
            document.getElementById('home').classList.remove('hidden');
            document.getElementById('list').classList.add('hidden');
            document.getElementById('detail').classList.add('hidden');
            // Pulizia testi per evitare trascinamenti
            document.getElementById('det-title').innerText = "";
            document.getElementById('det-ing').innerText = "";
            document.getElementById('det-step').innerText = "";
            
            const cats = [...new Set(recipes.map(r => r.cat))];
            document.getElementById('folder-grid').innerHTML = cats.map(c => `<div class="folder" onclick="showCat('${c}')"><i>${icons[c] || "📂"}</i><span>${c}</span></div>`).join('') || "<p style='text-align:center;grid-column:1/3;padding-top:40px;'>Tocca + per iniziare.</p>";
        }

        function showCat(c) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('list').classList.remove('hidden');
            document.getElementById('detail').classList.add('hidden');
            document.getElementById('cat-title').innerText = c;
            const filtered = recipes.filter(r => r.cat === c);
            document.getElementById('recipe-items').innerHTML = filtered.map(r => `<div class="recipe-item" onclick="showDet('${r.id}')"><span>${r.title}</span><span>→</span></div>`).join('');
        }

        function showDet(id) {
            const r = recipes.find(x => x.id === id);
            if(!r) return;
            document.getElementById('list').classList.add('hidden');
            document.getElementById('detail').classList.remove('hidden');
            document.getElementById('det-title').innerText = r.title;
            document.getElementById('det-ing').innerText = r.ing || '';
            document.getElementById('det-step').innerText = r.step || '';
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-trigger').onclick = () => openEdit(r);
            document.getElementById('del-trigger').onclick = () => deleteRecipe(id, r.title);
            document.getElementById('btn-back-to-list').onclick = () => showCat(r.cat);
        }

        async function runOCR(input) {
            if (input.files && input.files[0]) {
                const status = document.getElementById('ocr-status');
                status.style.display = 'block';
                try {
                    const worker = await Tesseract.createWorker('ita');
                    const { data: { text } } = await worker.recognize(input.files[0]);
                    // Pulizia testo dai simboli strani
                    const cleanText = text.replace(/[^a-zA-Z0-9àèìòùÁÉÍÓÚ\s,.:\-\/]/g, '');
                    document.getElementById('in-ing').value += "\n" + cleanText;
                    await worker.terminate();
                    alert("IA: Lettura finita!");
                } catch (e) { alert("Errore IA"); }
                status.style.display = 'none';
            }
        }

        function deleteRecipe(id, name) {
            if(confirm(`Eliminare "${name}"?`)) {
                db.ref('ricette/' + id).remove().then(() => showHome());
            }
        }

        function openEdit(r) {
            openM();
            document.getElementById('modal-title').innerText = "Modifica Ricetta";
            document.getElementById('ocr-area').classList.add('hidden');
            document.getElementById('in-title').value = r.title;
            document.getElementById('in-cat').value = r.cat;
            document.getElementById('in-ing').value = r.ing;
            document.getElementById('in-step').value = r.step;
            document.getElementById('edit-id').value = r.id;
        }

        function openM() { 
            document.getElementById('modal-title').innerText = "Nuova Ricetta";
            document.getElementById('ocr-area').classList.remove('hidden');
            document.getElementById('edit-id').value = "";
            document.getElementById('modal').style.display='block'; 
        }

        function closeM() { 
            document.getElementById('modal').style.display='none';
            document.getElementById('in-title').value=""; document.getElementById('in-cat').value="";
            document.getElementById('in-ing').value=""; document.getElementById('in-step').value="";
        }

        function save() {
            const id = document.getElementById('edit-id').value;
            const data = {
                title: document.getElementById('in-title').value.trim(),
                cat: document.getElementById('in-cat').value.trim() || "Varie",
                ing: document.getElementById('in-ing').value,
                step: document.getElementById('in-step').value
            };
            if(!data.title) return alert("Manca il titolo!");
            if(id) db.ref('ricette/' + id).set(data, () => closeM());
            else db.ref('ricette').push(data, () => closeM());
        }

        function searchRecipes() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const resDiv = document.getElementById('search-results');
            if(query.length > 0) {
                document.getElementById('folder-grid').classList.add('hidden');
                resDiv.classList.remove('hidden');
                const filtered = recipes.filter(r => r.title.toLowerCase().includes(query));
                resDiv.innerHTML = filtered.map(r => `<div class="recipe-item" onclick="showDet('${r.id}')"><span><b>${r.title}</b></span><span>→</span></div>`).join('');
            } else { 
                document.getElementById('folder-grid').classList.remove('hidden'); resDiv.classList.add('hidden'); 
            }
        }

        function exportCSV() {
            let csv = "Titolo;Categoria;Ingredienti;Procedimento\n";
            recipes.forEach(r => csv += `"${r.title}";"${r.cat}";"${r.ing}";"${r.step}"\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob); link.download = "backup_ricette.csv"; link.click();
        }
    </script>
</body>
</html>
