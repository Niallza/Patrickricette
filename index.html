<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ricettario Cloud Team</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #c92a2a; --bg: #f5f5f7; --card: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: calc(40px + env(safe-area-inset-top)) 20px 100px; color: #1d1d1f; }
        h1 { font-size: 30px; font-weight: 800; text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .folder { background: var(--card); padding: 25px 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; position: relative; }
        .folder i { font-size: 40px; display: block; margin-bottom: 10px; }
        .folder span { font-weight: 700; font-size: 18px; text-transform: capitalize; }
        .recipe-item { text-align: left; margin-bottom: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .recipe-detail { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .recipe-img { width: 100%; border-radius: 15px; margin-bottom: 20px; object-fit: cover; max-height: 350px; display: block; }
        .title-detail { font-size: 28px; font-weight: 800; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .section-h { font-size: 16px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-top: 25px; }
        .line { font-size: 19px; line-height: 1.5; padding: 8px 0; border-bottom: 1px solid #f2f2f7; }
        .back-btn { background: #e5e5ea; padding: 12px 20px; border-radius: 12px; display: inline-block; margin-bottom: 15px; font-weight: 600; cursor: pointer; }
        .fab { position: fixed; bottom: 30px; right: 20px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 35px; border: none; font-size: 35px; box-shadow: 0 8px 20px rgba(201, 42, 42, 0.3); z-index: 99; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; padding:40px 20px; z-index:1000; overflow-y:auto; }
        input, textarea { width:100%; padding: 16px; margin-bottom: 15px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 17px; background: #f2f2f7; }
        .img-preview { width: 100%; height: 150px; background: #f2f2f7; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #ccc; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; align-items:center; justify-content:center; z-index:2000; font-weight:bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">Connessione al Laboratorio...</div>

    <div id="home">
        <h1>Ricettario Team</h1>
        <div class="grid" id="folder-grid"></div>
    </div>

    <div id="list" class="hidden">
        <div class="back-btn" onclick="showHome()">← Cartelle</div>
        <h2 id="cat-title"></h2>
        <div id="recipe-items"></div>
    </div>

    <div id="detail" class="hidden">
        <div class="back-btn" id="btn-back-list">← Lista</div>
        <div class="recipe-detail">
            <img id="det-img" class="recipe-img" style="display:none;">
            <div id="det-title" class="title-detail"></div>
            <div class="section-h">Ingredienti</div>
            <div id="det-ing"></div>
            <div class="section-h">Procedimento</div>
            <div id="det-step"></div>
        </div>
    </div>

    <div id="modal">
        <h2>Nuova Ricetta Condivisa</h2>
        <div class="img-preview" id="preview-box">Foto Ricetta</div>
        <input type="file" id="in-file" accept="image/*" capture="environment" style="display:none" onchange="previewImg(this)">
        <button onclick="document.getElementById('in-file').click()" style="width:100%; padding:15px; background:#007aff; color:white; border:none; border-radius:12px; margin-bottom:20px; font-weight:700;">📸 FOTO PRODOTTO/FOGLIO</button>
        
        <input type="text" id="in-title" placeholder="Titolo (es. Rosetta)">
        <input type="text" id="in-cat" placeholder="Categoria (es. Pane)">
        <textarea id="in-ing" rows="5" placeholder="Ingredienti..."></textarea>
        <textarea id="in-step" rows="5" placeholder="Procedimento..."></textarea>
        
        <button onclick="save()" id="btn-save" style="width:100%; background:var(--primary); color:white; padding:20px; border-radius:15px; border:none; font-weight:800; font-size:20px;">PUBBLICA PER IL TEAM</button>
        <button onclick="closeM()" style="width:100%; background:none; border:none; margin-top:15px; color:grey;">Annulla</button>
    </div>

    <button class="fab" onclick="openM()">+</button>

    <script>
        // Configurazione Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBhp8YLfgCnD2PZ3AZ6oB2xb5dXJ19c-Fc",
            authDomain: "ricettario-laboratorio-92621.firebaseapp.com",
            databaseURL: "https://ricettario-laboratorio-92621-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ricettario-laboratorio-92621",
            storageBucket: "ricettario-laboratorio-92621.firebasestorage.app",
            messagingSenderId: "393684653408",
            appId: "1:393684653408:web:4376ed5d6c76d0adcc3a05"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let recipes = [];
        let currentImgData = "";
        const icons = { "Pane": "🍞", "Dolci": "🍰", "Basi": "🥣", "Lievitati": "🍕" };

        // Ascolta i cambiamenti nel Database in tempo reale
        db.ref('ricette').on('value', (snapshot) => {
            const data = snapshot.val();
            recipes = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            document.getElementById('loader').classList.add('hidden');
            showHome();
        });

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    currentImgData = e.target.result;
                    document.getElementById('preview-box').innerHTML = `<img src="${currentImgData}">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function showHome() {
            document.getElementById('home').classList.remove('hidden');
            document.getElementById('list').classList.add('hidden');
            document.getElementById('detail').classList.add('hidden');
            const cats = [...new Set(recipes.map(r => r.cat))];
            const grid = document.getElementById('folder-grid');
            grid.innerHTML = cats.map(c => `
                <div class="folder" onclick="showCat('${c}')"><i>${icons[c] || "📂"}</i><span>${c}</span></div>
            `).join('') || "<p style='grid-column:1/3;text-align:center;'>Nessuna ricetta nel Cloud.</p>";
        }

        function showCat(c) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('list').classList.remove('hidden');
            document.getElementById('cat-title').innerText = c;
            const filtered = recipes.filter(r => r.cat === c);
            document.getElementById('recipe-items').innerHTML = filtered.map(r => `
                <div class="folder recipe-item" onclick="showDet('${r.id}')" 
                     oncontextmenu="handleDel(event, '${r.id}')" ontouchstart="handleTouchStart(event, '${r.id}')" ontouchend="handleTouchEnd()">
                    <span>${r.title}</span><span style="color:#ccc">→</span>
                </div>
            `).join('');
        }

        function showDet(id) {
            const r = recipes.find(x => x.id === id);
            document.getElementById('list').classList.add('hidden');
            document.getElementById('detail').classList.remove('hidden');
            const imgTag = document.getElementById('det-img');
            if(r.img) { imgTag.src = r.img; imgTag.style.display = 'block'; } else { imgTag.style.display = 'none'; }
            document.getElementById('det-title').innerText = r.title;
            document.getElementById('det-ing').innerHTML = r.ing.split('\n').filter(l=>l).map(l=>`<div class="line">• ${l}</div>`).join('');
            document.getElementById('det-step').innerHTML = r.step.split('\n').filter(l=>l).map(l=>`<div class="line">• ${l}</div>`).join('');
            document.getElementById('btn-back-list').onclick = () => showCat(r.cat);
        }

        let pressTimer;
        function handleTouchStart(e, id) { pressTimer = setTimeout(() => confirmDel(id), 800); }
        function handleTouchEnd() { clearTimeout(pressTimer); }
        function handleDel(e, id) { e.preventDefault(); confirmDel(id); }
        function confirmDel(id) {
            if(confirm("Eliminare questa ricetta dal Cloud per TUTTI?")) {
                db.ref('ricette/' + id).remove();
            }
        }

        function openM() { document.getElementById('modal').style.display='block'; }
        function closeM() { 
            document.getElementById('modal').style.display='none';
            document.getElementById('in-title').value=""; document.getElementById('in-cat').value="";
            document.getElementById('in-ing').value=""; document.getElementById('in-step').value="";
            document.getElementById('preview-box').innerHTML="Foto Ricetta"; currentImgData="";
        }

        function save() {
            const t = document.getElementById('in-title').value.trim();
            const c = document.getElementById('in-cat').value.trim() || "Varie";
            if(!t) return alert("Titolo obbligatorio");
            
            document.getElementById('btn-save').innerText = "PUBBLICAZIONE...";
            db.ref('ricette').push({
                title: t, cat: c, 
                ing: document.getElementById('in-ing').value, 
                step: document.getElementById('in-step').value,
                img: currentImgData
            }, () => {
                document.getElementById('btn-save').innerText = "PUBBLICA PER IL TEAM";
                closeM();
            });
        }
    </script>
</body>
</html>
