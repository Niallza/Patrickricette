<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ricettario Smart Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --primary: #c92a2a; --bg: #f5f5f7; --card: #ffffff; --accent: #5856d6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: calc(40px + env(safe-area-inset-top)) 20px 100px; color: #1d1d1f; }
        
        .header-box { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 800; margin: 0 0 15px 0; }
        
        /* Barra di Ricerca Veloce */
        #search-bar { width: 100%; padding: 14px 15px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; margin-bottom: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .folder { background: var(--card); padding: 25px 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid rgba(0,0,0,0.03); }
        .folder i { font-size: 35px; display: block; margin-bottom: 8px; }
        .folder span { font-weight: 700; font-size: 16px; text-transform: capitalize; }
        
        .recipe-item { text-align: left; margin-bottom: 10px; padding: 18px; display: flex; justify-content: space-between; align-items: center; background: white; border-radius: 15px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .recipe-detail { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 60vh; }
        
        .title-detail { font-size: 28px; font-weight: 800; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; color: #000; }
        .section-h { font-size: 14px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-top: 25px; letter-spacing: 1px; }
        .line { font-size: 19px; line-height: 1.6; padding: 10px 0; border-bottom: 1px solid #f2f2f7; white-space: pre-wrap; color: #3a3a3c; }
        
        .back-btn { background: #e5e5ea; padding: 12px 20px; border-radius: 12px; display: inline-block; margin-bottom: 15px; font-weight: 600; cursor: pointer; }
        .fab { position: fixed; bottom: 30px; right: 20px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 35px; border: none; font-size: 35px; box-shadow: 0 8px 20px rgba(201, 42, 42, 0.3); z-index: 99; }
        
        /* Modale Nuova Ricetta */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; padding:40px 20px; z-index:1000; overflow-y:auto; }
        input, textarea { width:100%; padding: 15px; margin-bottom: 15px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 16px; background: #f2f2f7; font-family: inherit; }
        
        /* Bottone IA */
        .btn-ai { background: var(--accent); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 700; width: 100%; margin-bottom: 20px; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .ocr-loader { display: none; text-align: center; color: var(--accent); font-weight: 700; margin-bottom: 15px; padding: 10px; background: #f0f0ff; border-radius: 10px; }
        
        .btn-save { width:100%; background:var(--primary); color:white; padding:20px; border-radius:15px; border:none; font-weight:800; font-size:18px; margin-top: 10px; }
        .hidden { display: none !important; }
        .loading-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; align-items:center; justify-content:center; z-index:2000; font-weight:800; }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">Sincronizzazione Team...</div>

    <div id="home">
        <div class="header-box">
            <h1>Ricettario Team</h1>
            <button onclick="exportCSV()" style="background:#34c759; color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:600; font-size:13px;">📥 Backup Excel (CSV)</button>
        </div>
        
        <input type="text" id="search-bar" placeholder="🔍 Cerca per nome o categoria..." oninput="searchRecipes()">

        <div id="search-results" class="hidden"></div>
        <div class="grid" id="folder-grid"></div>
    </div>

    <div id="list" class="hidden">
        <div class="back-btn" onclick="showHome()">← Cartelle</div>
        <h2 id="cat-title" style="margin-bottom:20px;"></h2>
        <div id="recipe-items"></div>
    </div>

    <div id="detail" class="hidden">
        <div class="back-btn" id="btn-back-to-list">← Torna Indietro</div>
        <div class="recipe-detail">
            <div id="det-title" class="title-detail"></div>
            <div class="section-h">Ingredienti</div>
            <div id="det-ing" class="line"></div>
            <div class="section-h">Procedimento</div>
            <div id="det-step" class="line"></div>
        </div>
    </div>

    <div id="modal">
        <h2 style="margin-top:0;">Nuova Ricetta Smart</h2>
        
        <div id="ocr-status" class="ocr-loader">✨ L'IA sta leggendo la foto... attendi qualche secondo...</div>
        
        <button class="btn-ai" onclick="document.getElementById('ai-input').click()">
            <span>📸</span> LEGGI TESTO DA FOTO (AI)
        </button>
        <input type="file" id="ai-input" accept="image/*" style="display:none" onchange="runOCR(this)">

        <input type="text" id="in-title" placeholder="Nome della Ricetta">
        <input type="text" id="in-cat" placeholder="Categoria (es. Pane, Dolci, Basi)">
        <textarea id="in-ing" rows="6" placeholder="Ingredienti (uno per riga)"></textarea>
        <textarea id="in-step" rows="8" placeholder="Procedimento completo..."></textarea>
        
        <button class="btn-save" id="btn-save-cloud" onclick="save()">SALVA NEL CLOUD</button>
        <button onclick="closeM()" style="width:100%; background:none; border:none; margin-top:15px; color:#8e8e93; font-weight:600;">Annulla</button>
    </div>

    <button class="fab" onclick="openM()">+</button>

    <script>
        // Configurazione Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBhp8YLfgCnD2PZ3AZ6oB2xb5dXJ19c-Fc",
            authDomain: "ricettario-laboratorio-92621.firebaseapp.com",
            databaseURL: "https://ricettario-laboratorio-92621-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ricettario-laboratorio-92621",
            storageBucket: "ricettario-laboratorio-92621.firebasestorage.app",
            messagingSenderId: "393684653408",
            appId: "1:393684653408:web:4376ed5d6c76d0adcc3a05"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('ricette').keepSynced(true); // Supporto Offline

        let recipes = [];
        const icons = { "Pane": "🍞", "Dolci": "🍰", "Basi": "🥣", "Lievitati": "🍕", "Pasticceria": "🥐", "Focacce": "🍕" };

        // Sincronizzazione in tempo reale
        db.ref('ricette').on('value', (snapshot) => {
            const data = snapshot.val();
            recipes = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            document.getElementById('loader').classList.add('hidden');
            showHome();
        });

        // Funzione IA: Trasforma foto in testo
        async function runOCR(input) {
            if (input.files && input.files[0]) {
                const status = document.getElementById('ocr-status');
                status.style.display = 'block';
                try {
                    const result = await Tesseract.recognize(input.files[0], 'ita');
                    document.getElementById('in-ing').value += "\n[TESTO LETTO DA FOTO]:\n" + result.data.text;
                    alert("L'IA ha finito di leggere! Controlla il campo ingredienti e sposta il testo se necessario.");
                } catch (e) {
                    alert("Errore durante la lettura della foto.");
                }
                status.style.display = 'none';
                input.value = ""; // Reset input
            }
        }

        function searchRecipes() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const resultsDiv = document.getElementById('search-results');
            const gridDiv = document.getElementById('folder-grid');

            if(query.length > 0) {
                gridDiv.classList.add('hidden');
                resultsDiv.classList.remove('hidden');
                const filtered = recipes.filter(r => r.title.toLowerCase().includes(query) || r.cat.toLowerCase().includes(query));
                resultsDiv.innerHTML = filtered.map(r => `
                    <div class="recipe-item" onclick="showDet('${r.id}')">
                        <span><b>${r.title}</b> <small style="color:gray">(${r.cat})</small></span><span>→</span>
                    </div>
                `).join('') || "<p style='text-align:center; padding:20px; color:gray;'>Nessuna ricetta trovata.</p>";
            } else {
                gridDiv.classList.remove('hidden');
                resultsDiv.classList.add('hidden');
            }
        }

        function showHome() {
            document.getElementById('home').classList.remove('hidden');
            document.getElementById('list').classList.add('hidden');
            document.getElementById('detail').classList.add('hidden');
            const cats = [...new Set(recipes.map(r => r.cat))];
            document.getElementById('folder-grid').innerHTML = cats.map(c => `
                <div class="folder" onclick="showCat('${c}')">
                    <i>${icons[c] || "📂"}</i><span>${c}</span>
                </div>
            `).join('') || "<p style='grid-column:1/3;text-align:center;padding-top:30px;color:gray;'>Nessuna ricetta Cloud.<br>Tocca + per iniziare.</p>";
        }

        function showCat(c) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('list').classList.remove('hidden');
            document.getElementById('cat-title').innerText = c;
            const filtered = recipes.filter(r => r.cat === c);
            document.getElementById('recipe-items').innerHTML = filtered.map(r => `
                <div class="recipe-item" onclick="showDet('${r.id}')" 
                     oncontextmenu="handleDel(event, '${r.id}')" 
                     ontouchstart="handleTouchStart(event, '${r.id}')" 
                     ontouchend="handleTouchEnd()">
                    <span>${r.title}</span><span>→</span>
                </div>
            `).join('');
        }

        function showDet(id) {
            const r = recipes.find(x => x.id === id);
            document.getElementById('home').classList.add('hidden');
            document.getElementById('list').classList.add('hidden');
            document.getElementById('detail').classList.remove('hidden');
            document.getElementById('det-title').innerText = r.title;
            document.getElementById('det-ing').innerText = r.ing || '';
            document.getElementById('det-step').innerText = r.step || '';
            document.getElementById('btn-back-to-list').onclick = () => r.cat ? showCat(r.cat) : showHome();
        }

        // Esportazione Excel (Backup)
        function exportCSV() {
            let csv = "Titolo;Categoria;Ingredienti;Procedimento\n";
            recipes.forEach(r => {
                let cleanIng = r.ing.replace(/\n/g, ' | ');
                let cleanStep = r.step.replace(/\n/g, ' | ');
                csv += `"${r.title}";"${r.cat}";"${cleanIng}";"${cleanStep}"\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "backup_laboratorio_" + new Date().toLocaleDateString() + ".csv";
            link.click();
        }

        // Eliminazione (Pressione Lunga o Tasto Destro)
        let pressTimer;
        function handleTouchStart(e, id) { pressTimer = setTimeout(() => confirmDel(id), 1000); }
        function handleTouchEnd() { clearTimeout(pressTimer); }
        function handleDel(e, id) { e.preventDefault(); confirmDel(id); }
        function confirmDel(id) {
            if(confirm("Vuoi eliminare questa ricetta dal Cloud per TUTTO il team?")) {
                db.ref('ricette/' + id).remove();
                showHome();
            }
        }

        function openM() { document.getElementById('modal').style.display='block'; }
        function closeM() { 
            document.getElementById('modal').style.display='none';
            document.getElementById('in-title').value=""; document.getElementById('in-cat').value="";
            document.getElementById('in-ing').value=""; document.getElementById('in-step').value="";
        }

        function save() {
            const t = document.getElementById('in-title').value.trim();
            const c = document.getElementById('in-cat').value.trim() || "Varie";
            if(!t) return alert("Inserisci il nome della ricetta!");
            
            document.getElementById('btn-save-cloud').innerText = "SALVATAGGIO...";
            db.ref('ricette').push({
                title: t, cat: c, 
                ing: document.getElementById('in-ing').value, 
                step: document.getElementById('in-step').value
            }, () => {
                document.getElementById('btn-save-cloud').innerText = "SALVA NEL CLOUD";
                closeM();
            });
        }
    </script>
</body>
</html>
